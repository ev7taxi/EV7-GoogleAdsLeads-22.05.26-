<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>สมัครขับ EV7 Taxi</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --primary:#0F172A;
  --secondary:#334155;

  --green:#22C55E;
  --blue:#2563EB;

  --cta:#FF5A1F;
  --cta-hover:#E14B12;

  --text:#111827;
  --muted:#6B7280;

  --border:#E5E7EB;
  --bg:#F4F7FB;
  --white:#FFFFFF;
}

body{
  font-family:'Sarabun',sans-serif;
  background:linear-gradient(135deg,#EEF4FF 0%,#F8FAFC 100%);
  color:var(--text);
}

.container{
  max-width:1080px;
  margin:auto;
  padding:24px 16px 48px;
}

.main-card{
  background:var(--white);
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 16px 50px rgba(15,23,42,0.08);
}

.hero{
  background:linear-gradient(
    135deg,
    #0F172A 0%,
    #1E3A8A 100%
  );

  padding:42px 24px 48px;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  width:320px;
  height:320px;
  border-radius:50%;
  background:rgba(255,255,255,0.05);
  top:-180px;
  right:-100px;
}

.logo{
  width:210px;
  max-width:100%;
  margin:auto auto 20px;
  display:block;
}

.hero h1{
  font-size:38px;
  line-height:1.2;
  font-weight:800;
  color:white;
  margin-bottom:14px;
}

.hero p{
  max-width:620px;
  margin:auto;
  font-size:16px;
  line-height:1.8;
  color:rgba(255,255,255,0.9);
}

.content{
  padding:36px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;

  padding:10px 16px;
  border-radius:999px;

  background:#EFF6FF;
  color:#1D4ED8;

  font-size:13px;
  font-weight:700;

  margin-bottom:28px;
}

.section-title{
  font-size:14px;
  font-weight:800;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:#1E3A8A;

  margin-bottom:18px;

  display:flex;
  align-items:center;
  gap:10px;
}

.section-title::before{
  content:"";
  width:5px;
  height:18px;
  border-radius:999px;
  background:linear-gradient(
    180deg,
    #2563EB,
    #22C55E
  );
}

.car-grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(260px,1fr));

  gap:20px;
  margin-bottom:36px;
}

.car-card{
  border:1px solid var(--border);
  border-radius:22px;
  overflow:hidden;
  background:var(--white);

  transition:0.25s ease;

  box-shadow:
  0 4px 14px rgba(15,23,42,0.05);
}

.car-card:hover{
  transform:translateY(-4px);
  box-shadow:
  0 12px 28px rgba(15,23,42,0.1);
}

.car-image-wrap{
  background:#F8FAFC;
  padding:22px;
}

.car-image{
  width:100%;
  height:180px;
  object-fit:contain;
  display:block;
}

.car-content{
  padding:22px;
}

.car-name{
  font-size:24px;
  font-weight:800;
  margin-bottom:14px;
}

.car-price{
  display:inline-flex;
  align-items:center;
  justify-content:center;

  padding:12px 18px;
  border-radius:999px;

  background:linear-gradient(
    135deg,
    #2563EB,
    #1D4ED8
  );

  color:white;
  font-size:20px;
  font-weight:800;
}

.features{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(240px,1fr));

  gap:16px;
  margin-bottom:34px;
}

.feature{
  background:#F8FAFC;
  border:1px solid #E2E8F0;

  border-radius:18px;
  padding:18px;

  display:flex;
  gap:14px;
  align-items:flex-start;
}

.feature-icon{
  width:46px;
  height:46px;

  border-radius:14px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:linear-gradient(
    135deg,
    #2563EB,
    #22C55E
  );

  color:white;
  font-size:20px;
  flex-shrink:0;
}

.feature-text{
  font-size:15px;
  font-weight:700;
  line-height:1.6;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.form-group{
  margin-bottom:18px;
}

.full{
  grid-column:1/-1;
}

label{
  display:block;
  margin-bottom:8px;

  font-size:14px;
  font-weight:700;
}

.required{
  color:#DC2626;
}

input[type=text],
input[type=tel],
select{
  width:100%;
  height:54px;

  border-radius:16px;
  border:1.5px solid #D1D5DB;

  padding:0 16px;

  background:#FAFAFA;

  font-size:15px;
  font-family:inherit;

  transition:0.2s;
  outline:none;
}

input:focus,
select:focus{
  border-color:#2563EB;
  background:white;

  box-shadow:
  0 0 0 4px rgba(37,99,235,0.12);
}

.checkbox-grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(160px,1fr));

  gap:12px;
  margin-top:14px;
}

.checkbox-item{
  display:flex;
  align-items:center;
  gap:10px;

  padding:14px;
  border-radius:14px;

  background:#F9FAFB;
  border:1px solid var(--border);

  cursor:pointer;
  transition:0.2s;
}

.checkbox-item:hover{
  border-color:#2563EB;
  background:#EFF6FF;
}

.checkbox-item input{
  width:18px;
  height:18px;
  accent-color:#2563EB;
}

.benefit-box{
  margin:32px 0;

  border-radius:22px;

  background:linear-gradient(
    135deg,
    #EFF6FF,
    #F0FDF4
  );

  border:1px solid #DBEAFE;

  padding:24px;
}

.benefit-item{
  padding:14px 0;
  border-bottom:1px solid rgba(0,0,0,0.06);

  font-size:15px;
  font-weight:700;
}

.benefit-item:last-child{
  border-bottom:none;
}

.consent{
  margin-top:28px;

  background:#F8FAFC;
  border-radius:20px;

  padding:22px;
}

.consent-item{
  display:flex;
  align-items:flex-start;
  gap:12px;

  margin-bottom:16px;
}

.consent-item:last-child{
  margin-bottom:0;
}

.consent-item input{
  width:20px;
  height:20px;

  margin-top:2px;

  accent-color:#2563EB;
}

.submit-btn{
  width:100%;
  height:60px;

  border:none;
  border-radius:18px;

  background:linear-gradient(
    135deg,
    var(--cta),
    #FF7A1A
  );

  color:white;

  font-size:19px;
  font-weight:800;
  font-family:inherit;

  cursor:pointer;

  margin-top:30px;

  transition:0.25s ease;

  box-shadow:
  0 12px 28px rgba(255,90,31,0.28);
}

.submit-btn:hover{
  transform:translateY(-2px);
  background:linear-gradient(
    135deg,
    var(--cta-hover),
    #F97316
  );
}

.submit-btn:disabled{
  opacity:0.7;
  cursor:not-allowed;
}

.footer{
  text-align:center;
  padding:28px 16px 0;

  font-size:13px;
  color:var(--muted);
}

.success{
  display:none;
  text-align:center;
  padding:80px 24px;
}

.success h2{
  font-size:32px;
  margin-bottom:14px;
}

.success p{
  font-size:16px;
  color:var(--muted);
  line-height:1.8;
}

@media(max-width:768px){

  .hero{
    padding:34px 20px 40px;
  }

  .hero h1{
    font-size:30px;
  }

  .content{
    padding:24px;
  }

  .form-grid{
    grid-template-columns:1fr;
  }

}

</style>

</head>

<body>

<div class="container">

  <div class="main-card">

    <div class="hero">

      <img
        src="image/EV7-Logo-with-Tagline.png"
        class="logo"
        alt="EV7 Logo"
      >

      <h1>
        สมัครขับ EV7 Taxi
      </h1>

      <p>
        ลงทะเบียนเพื่อรับข้อเสนอพิเศษ
        พร้อมให้เจ้าหน้าที่ติดต่อกลับภายใน 24 ชั่วโมง
      </p>

    </div>

    <div class="content" id="formBody">

      <div class="badge">
        EV7 Electric Taxi
      </div>

      <div class="section-title">
        รุ่นรถและราคาเช่า
      </div>

      <div class="car-grid">

        <div class="car-card">

          <div class="car-image-wrap">
            <img
              src="image/EV7-AION-ES_45-Front.png"
              class="car-image"
              alt="EV7 ES"
            >
          </div>

          <div class="car-content">

            <div class="car-name">
              ES
            </div>

            <div class="car-price">
              777 บาท/วัน
            </div>

          </div>

        </div>

        <div class="car-card">

          <div class="car-image-wrap">
            <img
              src="image/EV7_AION-YP_Front-45.png"
              class="car-image"
              alt="EV7 Y Plus 410"
            >
          </div>

          <div class="car-content">

            <div class="car-name">
              Y Plus 410
            </div>

            <div class="car-price">
              799 บาท/วัน
            </div>

          </div>

        </div>

        <div class="car-card">

          <div class="car-image-wrap">
            <img
              src="image/EV7_AION-YP_Front-45.png"
              class="car-image"
              alt="EV7 Y Plus 490"
            >
          </div>

          <div class="car-content">

            <div class="car-name">
              Y Plus 490
            </div>

            <div class="car-price">
              888 บาท/วัน
            </div>

          </div>

        </div>

      </div>

    </div>

    <div class="success" id="successMessage">

      <h2>
        ส่งข้อมูลสำเร็จ 🎉
      </h2>

      <p>
        เจ้าหน้าที่จะติดต่อกลับภายใน 24 ชั่วโมง
      </p>

    </div>

  </div>

  <div class="footer">
    © 2026 EV7 Electric Taxi
  </div>

</div>

</body>
</html>
