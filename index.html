<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV7 Lead Form</title>

<style>
body {
  font-family: sans-serif;
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.form-group {
  margin-bottom: 16px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
}

button {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

.checkbox-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.error-field {
  border: 1px solid red;
}
</style>
</head>

<body>

<h2>ลงทะเบียนรับสิทธิ์</h2>

<form id="leadForm">

<div id="formBody">

<div class="form-group">
<label>ชื่อ-นามสกุล</label>
<input type="text" name="fullname" required>
</div>

<div class="form-group">
<label>เบอร์โทร</label>
<input type="text" name="phone">
</div>

<div class="form-group">
<label>อายุ</label>
<select name="age"></select>
</div>

<div class="form-group">
<label>เลือกแอป</label>
<div class="checkbox-grid">
<label><input type="checkbox" name="apps" value="Grab"> Grab</label>
<label><input type="checkbox" name="apps" value="Bolt"> Bolt</label>
<label><input type="checkbox" name="apps" value="Lineman"> Lineman</label>
<label><input type="checkbox" name="apps" value="Robinhood"> Robinhood</label>
</div>
</div>

<div class="form-group consent-item">
<label><input type="checkbox" name="pdpa"> ยินยอม PDPA</label>
</div>

<div class="form-group consent-item">
<label><input type="checkbox" name="marketing"> ยินยอมการตลาด</label>
</div>

<input type="hidden" id="adsid" name="adsid">

<button id="submitBtn">ตรวจสอบสิทธิ์และรับข้อเสนอ</button>

</div>

</form>

<div id="successMessage" style="display:none;">
<h3>✅ ส่งข้อมูลสำเร็จ</h3>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwC278YHh-j-2wXjIYYuNMVTCiE3s7sz5y8zdMT9pdQgqRGJeRdG_0c53V2Ug1Y1K_y-g/exec';

// อายุ
const ageSelect = document.querySelector('select[name="age"]');
if(ageSelect){
  for(let i=18; i<=70; i++){
    const option = document.createElement('option');
    option.value = i;
    option.textContent = i + ' ปี';
    ageSelect.appendChild(option);
  }
}

// ads id
const params = new URLSearchParams(window.location.search);
const adsInput = document.getElementById('adsid');
if(adsInput){
  adsInput.value =
    params.get('gclid') ||
    params.get('utm_id') ||
    params.get('ad_id') ||
    'organic';
}

// phone format
const phoneInput = document.querySelector('input[name="phone"]');
if(phoneInput){
  phoneInput.addEventListener('input', function(e){
    let value = e.target.value.replace(/\D/g,'');
    if(value.length > 10) value = value.slice(0,10);

    if(value.length > 6){
      value = value.replace(/(\d{3})(\d{3})(\d+)/,'$1-$2-$3');
    } else if(value.length > 3){
      value = value.replace(/(\d{3})(\d+)/,'$1-$2');
    }

    e.target.value = value;
  });
}

// error functions
function removeErrors(){
  document.querySelectorAll('.error-message').forEach(el => el.remove());
  document.querySelectorAll('.error-field').forEach(el => el.classList.remove('error-field'));
}

function createError(element,message){
  if(!element) return;
  element.classList.add('error-field');

  const error = document.createElement('div');
  error.className = 'error-message';
  error.innerText = message;
  error.style.color = 'red';
  error.style.fontSize = '13px';

  element.appendChild(error);
}

// submit
const form = document.getElementById('leadForm');

if(form){
form.addEventListener('submit', async function(e){

e.preventDefault();
removeErrors();

let isValid = true;

const submitBtn = document.getElementById('submitBtn');

const phoneField = document.querySelector('input[name="phone"]');
const phoneContainer = phoneField ? phoneField.closest('.form-group') : null;
const phone = phoneField ? phoneField.value.replace(/\D/g,'') : '';

if(phone.length !== 10){
  createError(phoneContainer,'กรุณากรอกเบอร์โทร 10 หลัก');
  isValid = false;
}

const apps = document.querySelectorAll('input[name="apps"]:checked');
const checkboxGrid = document.querySelector('.checkbox-grid');

if(apps.length === 0){
  createError(checkboxGrid,'กรุณาเลือกอย่างน้อย 1 รายการ');
  isValid = false;
}

const pdpa = document.querySelector('input[name="pdpa"]');
if(!pdpa || !pdpa.checked){
  createError(pdpa.closest('.consent-item'),'กรุณายินยอม PDPA');
  isValid = false;
}

const marketing = document.querySelector('input[name="marketing"]');
if(!marketing || !marketing.checked){
  createError(marketing.closest('.consent-item'),'กรุณายินยอมการตลาด');
  isValid = false;
}

if(!isValid) return;

submitBtn.disabled = true;
submitBtn.innerText = 'กำลังส่งข้อมูล...';

const formData = new FormData(form);

const data = {
  fullname: formData.get('fullname'),
  phone: phone,
  age: formData.get('age'),
  apps: formData.getAll('apps'),
  pdpa: 'Yes',
  marketing: 'Yes',
  adsid: formData.get('adsid'),
  timestamp: new Date().toISOString(),
  source: 'EV7 Landing Page'
};

try{

const response = await fetch(SCRIPT_URL,{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body: JSON.stringify(data)
});

const result = await response.json();

if(result.status === 'success'){
  document.getElementById('formBody').style.display = 'none';
  document.getElementById('successMessage').style.display = 'block';
  window.scrollTo({top:0,behavior:'smooth'});
}else{
  throw new Error();
}

}catch(err){
  alert('เกิดข้อผิดพลาด');
  submitBtn.disabled = false;
  submitBtn.innerText = 'ตรวจสอบสิทธิ์และรับข้อเสนอ';
}

});
}

});
</script>

</body>
</html>
